name: Release Chrome extension

on:
  release:
    types: ["published"]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to upload the Chrome package to.
        required: true
        type: string

permissions:
  contents: write

jobs:
  chrome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Package Chrome extension
        run: |
          cd dist
          zip -r ../hanako-extension-chrome.zip .
      - name: Upload Chrome package
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag }}
          files: hanako-extension-chrome.zip
